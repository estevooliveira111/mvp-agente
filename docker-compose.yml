services:
  # ==========================================
  # Banco de Dados Relacional (PostgreSQL)
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: mvp_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: mvp_agente
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mvp_network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # Memória Ultrarrápida / Cache (Memcached)
  # ==========================================
  memcached:
    image: memcached:alpine
    container_name: mvp_memcached
    restart: always
    ports:
      - "11211:11211"
    command:
      - "-m 128"
    networks:
      - mvp_network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 192M
        reservations:
          cpus: "0.1"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # Banco de Dados Vetorial (ChromaDB)
  # ==========================================
  chromadb:
    image: chromadb/chroma:latest
    container_name: mvp_chromadb
    restart: always
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    networks:
      - mvp_network
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  chromadb_data:

networks:
  mvp_network:
    driver: bridge
